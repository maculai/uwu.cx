  <style>
    * { cursor: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    :root { --c1: #ff00aa; --c2: #00d4ff; --c3: #aaff00; --c4: #ff6600; --c5: #cc00ff; }

    body {
      background: #04050a; font-family: 'Share Tech Mono', monospace;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 50; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.055) 3px, rgba(0,0,0,0.055) 4px);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 49; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.9) 100%);
    }
    canvas#bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .grid-bg {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: linear-gradient(rgba(0,212,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.022) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* cursor */
    .cursor { position: fixed; z-index: 9999; pointer-events: none; width: 20px; height: 20px; margin: -10px 0 0 -10px; }
    .cursor-ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid var(--c2); transition: transform 0.15s ease, border-color 0.2s; }
    .cursor-dot { position: absolute; top: 50%; left: 50%; width: 3px; height: 3px; margin: -1.5px 0 0 -1.5px; border-radius: 50%; background: var(--c2); transition: background 0.2s; }
    .cursor-line { position: absolute; background: var(--c2); transition: background 0.2s; }
    .cursor-line.t { top:0; left:50%; width:1px; height:6px; margin-left:-0.5px; }
    .cursor-line.b { bottom:0; left:50%; width:1px; height:6px; margin-left:-0.5px; }
    .cursor-line.l { left:0; top:50%; height:1px; width:6px; margin-top:-0.5px; }
    .cursor-line.r { right:0; top:50%; height:1px; width:6px; margin-top:-0.5px; }
    body.hovering .cursor-ring { transform: scale(2.5); border-color: var(--c1); }
    body.hovering .cursor-dot { background: var(--c1); }
    body.hovering .cursor-line { background: var(--c1); }

    /* HUD */
    .hud { position: fixed; z-index: 200; font-size: 10px; letter-spacing: 0.1em; color: #192e42; pointer-events: none; }
    .hud span { color: #1e4a68; }
    .hud.tl { top: 20px; left: 22px; }
    .hud.tr { top: 20px; right: 22px; }
    .hud.br { bottom: 20px; right: 22px; }

    /* discord presence bottom left */
    .hud-status { position: fixed; bottom: 20px; left: 22px; z-index: 200; pointer-events: none; font-size: 10px; letter-spacing: 0.1em; display: flex; flex-direction: column; gap: 4px; }
    .status-row { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.online  { background: #aaff00; animation: blink 1.5s ease-in-out infinite; }
    .status-dot.idle    { background: #ffcc00; }
    .status-dot.dnd     { background: #ff4444; }
    .status-dot.offline { background: #444; }
    .status-main .s-online  { color: #aaff00; }
    .status-main .s-idle    { color: #ffcc00; }
    .status-main .s-dnd     { color: #ff4444; }
    .status-main .s-offline { color: #444; }
    .status-main .loc { color: #1e4a68; }
    .activity-row { font-size: 9px; color: #1a3a52; letter-spacing: 0.08em; display: flex; align-items: center; gap: 5px; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0; transition: opacity 0.4s; }
    .activity-row.visible { opacity: 1; }

    /* scene */
    .scene { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; padding: 0 24px; }

    /* wordmark */
    .wordmark-wrap {
      position: relative; padding: 18px 16px;
      opacity: 0; transform: translateY(60px) scale(0.88);
      animation: entrance 1s 0.05s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .wordmark-wrap::before, .wordmark-wrap::after, .br-bl, .br-br {
      content: ''; position: absolute; width: 22px; height: 22px;
      border-style: solid; border-color: rgba(255,255,255,0.12);
      transition: border-color 0.3s, width 0.3s, height 0.3s;
    }
    .wordmark-wrap::before { top:0; left:0; border-width:1px 0 0 1px; }
    .wordmark-wrap::after  { top:0; right:0; border-width:1px 1px 0 0; }
    .br-bl { bottom:0; left:0; border-width:0 0 1px 1px; }
    .br-br { bottom:0; right:0; border-width:0 1px 1px 0; }
    .wordmark-wrap:hover::before, .wordmark-wrap:hover::after,
    .wordmark-wrap:hover .br-bl, .wordmark-wrap:hover .br-br { width:32px; height:32px; border-color:rgba(255,255,255,0.35); }
    .wordmark {
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      font-size: clamp(60px,19vw,200px); line-height: 1; letter-spacing: -4px;
      user-select: none; position: relative;
      animation: floatup 4s 1.3s ease-in-out infinite alternate;
    }
    .wordmark .l { display: inline-block; transition: color 1.5s ease, text-shadow 1.5s ease, transform 0.15s ease; }
    .wordmark .l:hover { transform: scale(1.12) translateY(-4px); }
    .wordmark .dot { font-size: 0.45em; vertical-align: middle; margin: 0 2px; opacity: 0.25; color: #fff !important; text-shadow: none !important; }
    .wordmark::after {
      content: 'uwu.cx'; position: absolute; inset: 0;
      font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: -4px;
      color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.12);
      opacity: 0; pointer-events: none; animation: ghost 12s 4s infinite;
    }

    /* bottom row */
    .bottom-row {
      display: flex; align-items: center; justify-content: center; gap: 44px; width: 100%;
      opacity: 0; transform: translateY(30px);
      animation: entrance 0.9s 1.0s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* now playing */
    .now-playing { display: flex; align-items: center; gap: 20px; }

    /* vinyl canvas */
    canvas#vinyl-canvas {
      width: 64px; height: 64px; border-radius: 50%; display: block;
      flex-shrink: 0;
      transition: box-shadow 0.4s;
      border: 1px solid rgba(255,255,255,0.06);
    }
    canvas#vinyl-canvas:hover {
      box-shadow: 0 0 40px rgba(255,255,255,0.2), 0 0 80px rgba(255,255,255,0.08) !important;
    }

    /* arrows */
    .station-arrows { display: flex; flex-direction: column; gap: 4px; }
    .arrow-btn {
      width: 18px; height: 18px; background: none;
      border: 1px solid rgba(255,255,255,0.07); border-radius: 2px;
      color: #253a4a; display: flex; align-items: center; justify-content: center;
      font-size: 8px; transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.1s;
    }
    .arrow-btn:hover { color: var(--c2); border-color: rgba(0,212,255,0.35); background: rgba(0,212,255,0.05); transform: scale(1.15); }

    /* info */
    .np-info { flex: 1; min-width: 0; }
    .np-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: #2a4a6a; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #aaff00; animation: blink 1.2s ease-in-out infinite; flex-shrink: 0; }
    .live-dot.off { background: #2a4a6a; animation: none; }
    .np-name-wrap { height: 20px; overflow: hidden; display: flex; align-items: center; }
    .np-name { font-family: 'Orbitron', sans-serif; font-size: clamp(11px,1.8vw,14px); font-weight: 900; color: #fff; line-height: 1; white-space: nowrap; }
    .np-name.switching { animation: stationSwitch 0.35s ease forwards; }
    .np-sub { font-size: 9px; color: #2a4a6a; margin-top: 4px; display: flex; align-items: center; gap: 6px; letter-spacing: 0.06em; }
    .rg-credit { font-size: 8px; color: #1a3a52; text-decoration: none; border-bottom: 1px solid rgba(0,212,255,0.12); padding-bottom: 1px; transition: color 0.2s, border-color 0.2s; }
    .rg-credit:hover { color: var(--c2); border-color: rgba(0,212,255,0.5); }
    .np-controls { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .play-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 13px; border: 1px solid rgba(255,255,255,0.1); border-radius: 2px;
      background: rgba(255,255,255,0.03); color: #3a6a8a;
      font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 0.15em;
      transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.1s;
    }
    .play-btn:hover { color: #aaff00; border-color: rgba(170,255,0,0.4); background: rgba(170,255,0,0.05); transform: scale(1.04); }
    .play-btn:active { transform: scale(0.97); }
    .play-btn svg { width: 9px; height: 9px; flex-shrink: 0; }
    input[type=range] { -webkit-appearance: none; width: 60px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.35); transition: background 0.2s, transform 0.1s; }
    input[type=range]:hover::-webkit-slider-thumb { background: #aaff00; transform: scale(1.3); }

    /* divider */
    .divider { width: 1px; height: 80px; flex-shrink: 0; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.07), transparent); }

    /* right block — steam + discord */
    .right-block { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }

    /* shared link card style */
    .link-card {
      display: inline-flex; align-items: center;
      padding: 0; border: 1px solid rgba(255,255,255,0.07); border-radius: 3px;
      background: rgba(255,255,255,0.02); text-decoration: none;
      overflow: hidden; position: relative;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
      min-width: 148px;
    }

    /* icon side */
    .link-card-icon {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.25s;
    }
    .link-card-icon svg { width: 14px; height: 14px; opacity: 0.5; transition: opacity 0.25s; }

    /* text side */
    .link-card-text {
      padding: 0 12px 0 0;
      display: flex; flex-direction: column; gap: 1px;
    }
    .link-card-label {
      font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase;
      color: #2a4060; transition: color 0.25s; line-height: 1;
    }
    .link-card-handle {
      font-size: 11px; letter-spacing: 0.06em; color: #3a6a8a;
      transition: color 0.25s; line-height: 1;
      /* handle swap */
      position: relative; height: 14px; overflow: hidden;
    }
    .link-card-handle span {
      position: absolute; left: 0; top: 0;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .link-card-handle .h-default { opacity: 1; transform: translateY(0); }
    .link-card-handle .h-hover   { opacity: 0; transform: translateY(6px); }
    .link-card:hover .link-card-handle .h-default { opacity: 0; transform: translateY(-6px); }
    .link-card:hover .link-card-handle .h-hover   { opacity: 1; transform: translateY(0); }

    /* steam specific */
    .link-card.steam:hover {
      border-color: rgba(100,180,220,0.5);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 20px rgba(100,180,220,0.12);
    }
    .link-card.steam:hover .link-card-icon { background: rgba(100,180,220,0.08); }
    .link-card.steam:hover .link-card-icon svg { opacity: 1; color: #64b4dc; }
    .link-card.steam:hover .link-card-label { color: #64b4dc; }
    .link-card.steam:hover .link-card-handle span { color: #fff; }

    /* discord specific */
    .link-card.discord:hover {
      border-color: rgba(114,137,218,0.55);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 20px rgba(114,137,218,0.15);
    }
    .link-card.discord:hover .link-card-icon { background: rgba(114,137,218,0.08); }
    .link-card.discord:hover .link-card-icon svg { opacity: 1; color: #7289da; }
    .link-card.discord:hover .link-card-label { color: #7289da; }
    .link-card.discord:hover .link-card-handle span { color: #fff; }

    /* shimmer sweep */
    .link-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      transform: translateX(-100%); transition: transform 0s;
    }
    .link-card:hover::after { transform: translateX(100%); transition: transform 0.5s ease; }

    /* keyframes */
    @keyframes entrance { to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes floatup { from { transform:translateY(0); } to { transform:translateY(-14px); } }
    @keyframes ghost { 0%,87%,100%{opacity:0;transform:none} 88%{opacity:1;transform:translateX(-5px) skewX(-3deg);clip-path:inset(18% 0 52% 0)} 89%{opacity:1;transform:translateX(5px);clip-path:inset(58% 0 8% 0)} 90%{opacity:0} }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes stationSwitch { 0%{opacity:1;transform:translateY(0)} 40%{opacity:0;transform:translateY(-6px)} 60%{opacity:0;transform:translateY(6px)} 100%{opacity:1;transform:translateY(0)} }
    .ripple { position:fixed; border-radius:50%; pointer-events:none; z-index:9998; animation:rippleOut 0.6s ease forwards; }
    @keyframes rippleOut { from{width:0;height:0;opacity:0.5;margin:0;border:1px solid var(--c2);} to{width:80px;height:80px;opacity:0;margin:-40px;border:1px solid var(--c2);} }

    @media (max-width: 560px) {
      .wordmark { letter-spacing:-2px; font-size:clamp(40px,19vw,200px); }
      .bottom-row { flex-direction:column; gap:24px; }
      .divider { width:60px; height:1px; background:linear-gradient(to right,transparent,rgba(255,255,255,0.07),transparent); }
      .right-block { align-items:center; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor">
  <div class="cursor-ring"></div><div class="cursor-dot"></div>
  <div class="cursor-line t"></div><div class="cursor-line b"></div>
  <div class="cursor-line l"></div><div class="cursor-line r"></div>
</div>
<canvas id="bg"></canvas>
<div class="grid-bg"></div>

<div class="hud tl">SYS // <span id="clock">--:--:--</span></div>
<div class="hud tr">HOST // <span>UWU.CX</span></div>
<div class="hud br">VER // <span>1.0</span></div>

<div class="hud-status">
  <div class="status-row">
    <div class="status-dot offline" id="status-dot"></div>
    <div class="status-main">
      <span id="status-word" class="s-offline">OFFLINE</span> <span class="loc">FROM PALM HARBOR, FLORIDA</span>
    </div>
  </div>
  <div class="activity-row" id="activity-row">
    <span id="activity-icon">🎮</span>
    <span id="activity-text"></span>
  </div>
</div>

<div class="scene">
  <div class="wordmark-wrap">
    <div class="br-bl"></div><div class="br-br"></div>
    <div class="wordmark">
      <span class="l" id="l0">u</span><span class="l" id="l1">w</span><span class="l" id="l2">u</span><span class="dot">.</span><span class="l" id="l3">c</span><span class="l" id="l4">x</span>
    </div>
  </div>

  <div class="bottom-row">
    <div class="now-playing">
      <canvas id="vinyl-canvas" width="128" height="128" onclick="togglePlay()"></canvas>
      <div class="np-info">
        <div class="np-label">
          <span class="live-dot off" id="live-dot"></span>
          <span>now playing</span>
        </div>
        <div class="np-name-wrap">
          <div class="np-name" id="np-name">Dr Dick's Dub Shack</div>
        </div>
        <div class="np-sub">
          <span id="np-sub-text">Bermuda</span>
          <a class="rg-credit" id="rg-link" href="https://radio.garden/listen/dr-dick-s-dub-shack/mqdXmYNU" target="_blank" rel="noopener">radio.garden ↗</a>
        </div>
        <div class="np-controls">
          <button class="play-btn" onclick="togglePlay()">
            <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            <span id="btn-label">play</span>
          </button>
          <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8"/>
        </div>
      </div>
      <div class="station-arrows">
        <button class="arrow-btn" onclick="prevStation()">▲</button>
        <button class="arrow-btn" onclick="nextStation()">▼</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="right-block">

      <!-- Steam -->
      <a class="link-card steam" href="https://steamcommunity.com/id/being" target="_blank" rel="noopener">
        <div class="link-card-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" color="#8ab4c8"><path d="M11.98 0C5.37 0 .004 5.177.004 11.568l6.432 2.66a3.31 3.31 0 0 1 1.913-.607l2.857-4.138V9.44a4.44 4.44 0 0 1 4.44-4.44 4.44 4.44 0 0 1 4.44 4.44 4.44 4.44 0 0 1-4.44 4.44h-.102L11.69 16.4a3.305 3.305 0 0 1-3.296 3.305 3.31 3.31 0 0 1-3.23-2.59L.38 15.265C2.258 20.3 6.72 24 11.98 24 18.626 24 24 18.627 24 12S18.626 0 11.98 0z"/></svg>

        <div class="link-card-text">

      <!-- Discord -->
      <a class="link-card discord" href="https://discord.com/users/312710961691754508" target="_blank" rel="noopener">
        <div class="link-card-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" color="#7289da"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>

<audio id="radio" preload="none" crossorigin="anonymous"></audio>

<script>
  const STATIONS = [
    { name: "Dr Dick's Dub Shack", sub: "Bermuda",        stream: "https://streamer.radio.co/s0635c8b0d/listen",                             rgLink: "https://radio.garden/listen/dr-dick-s-dub-shack/mqdXmYNU" },
    { name: "Dance UK Radio",        sub: "United Kingdom", stream: "https://radio.garden/api/ara/content/listen/pgQkXK7y/channel.mp3",         rgLink: "https://radio.garden/listen/dance-uk-radio/pgQkXK7y" },
  ];
  let stationIdx = 0, playing = false;
  const audio = document.getElementById('radio');
  audio.volume = 0.8;

  // ── vinyl canvas ──
  const vc = document.getElementById('vinyl-canvas');
  const vctx = vc.getContext('2d');
  let vAngle = 0, vHue = 0, vPulse = 1;
  let audioCtx, analyser, sourceNode, dataArr;

  function initAnalyser() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      dataArr = new Uint8Array(analyser.frequencyBinCount);
      sourceNode = audioCtx.createMediaElementSource(audio);
      sourceNode.connect(analyser);
      analyser.connect(audioCtx.destination);
    } catch(e) {}
  }

  function getPulse() {
    if (!analyser) return 1;
    analyser.getByteFrequencyData(dataArr);
    const avg = dataArr.reduce((a,b)=>a+b,0) / dataArr.length;
    return 1 + (avg/255)*0.4;
  }

  function drawVinyl() {
    const sz = 128, cx = sz/2, cy = sz/2, r = sz/2 - 2;
    vctx.clearRect(0,0,sz,sz);

    if (playing) { vAngle += 0.007; vHue += 0.5; vPulse += (getPulse() - vPulse)*0.1; }
    else          { vPulse += (1 - vPulse)*0.05; }

    // outer glow ring when playing
    if (playing) {
      for (let g = 0; g < 3; g++) {
        const gr = vctx.createRadialGradient(cx,cy,r*0.6,cx,cy,r*(1.1+g*0.15)*vPulse);
        const h = (vHue + g*40)%360;
        gr.addColorStop(0,`hsla(${h},100%,60%,0)`);
        gr.addColorStop(0.6,`hsla(${h},100%,60%,${0.06-g*0.015})`);
        gr.addColorStop(1,`hsla(${h},100%,60%,0)`);
        vctx.beginPath(); vctx.arc(cx,cy,r*(1.1+g*0.15)*vPulse,0,Math.PI*2);
        vctx.fillStyle=gr; vctx.fill();
      }
    }

    // clip to circle
    vctx.save();
    vctx.beginPath(); vctx.arc(cx,cy,r,0,Math.PI*2); vctx.clip();

    // dark base
    vctx.fillStyle='#06080f'; vctx.fillRect(0,0,sz,sz);

    // rainbow rings — 10 rings, each rotated
    const rings = 10, segs = 48;
    for (let ring = rings; ring >= 1; ring--) {
      const rOuter = r * (ring/rings);
      const rInner = r * ((ring-0.7)/rings);
      const alpha = playing ? (0.12 + (ring/rings)*0.28)*vPulse : (0.04 + (ring/rings)*0.1);
      for (let s = 0; s < segs; s++) {
        const a1 = (s/segs)*Math.PI*2 + vAngle + ring*0.3;
        const a2 = ((s+1)/segs)*Math.PI*2 + vAngle + ring*0.3;
        const hue = ((s/segs)*360 + vHue + ring*18)%360;
        vctx.beginPath();
        vctx.arc(cx,cy,rOuter,a1,a2);
        vctx.arc(cx,cy,rInner,a2,a1,true);
        vctx.closePath();
        vctx.fillStyle=`hsla(${hue},100%,55%,${alpha})`;
        vctx.fill();
      }
    }

    // grooves overlay
    for (let i=0;i<7;i++) {
      const gr = r*(0.28+i*0.1);
      vctx.beginPath(); vctx.arc(cx,cy,gr,0,Math.PI*2);
      vctx.strokeStyle='rgba(0,0,0,0.35)'; vctx.lineWidth=1.5; vctx.stroke();
    }

    // label area center
    const labelR = r*0.28;
    const lgr = vctx.createRadialGradient(cx,cy,0,cx,cy,labelR);
    lgr.addColorStop(0,'#0a0c14'); lgr.addColorStop(1,'#06080f');
    vctx.beginPath(); vctx.arc(cx,cy,labelR,0,Math.PI*2);
    vctx.fillStyle=lgr; vctx.fill();

    // center hole
    vctx.beginPath(); vctx.arc(cx,cy,5,0,Math.PI*2);
    vctx.fillStyle='#04050a'; vctx.fill();
    vctx.strokeStyle='rgba(255,255,255,0.18)'; vctx.lineWidth=1; vctx.stroke();

    vctx.restore();

    // hover shimmer
    if (vc.matches(':hover')) {
      vctx.save();
      vctx.beginPath(); vctx.arc(cx,cy,r,0,Math.PI*2); vctx.clip();
      const sh = vctx.createRadialGradient(cx-r*0.3,cy-r*0.3,0,cx,cy,r);
      sh.addColorStop(0,'rgba(255,255,255,0.1)'); sh.addColorStop(1,'rgba(255,255,255,0)');
      vctx.fillStyle=sh; vctx.fillRect(0,0,sz,sz);
      vctx.restore();
    }

    requestAnimationFrame(drawVinyl);
  }
  drawVinyl();

  // ── stations ──
  function updateUI() {
    const s = STATIONS[stationIdx];
    const el = document.getElementById('np-name');
    el.classList.remove('switching'); void el.offsetWidth; el.classList.add('switching');
    el.textContent = s.name;
    document.getElementById('np-sub-text').textContent = s.sub;
    document.getElementById('rg-link').href = s.rgLink;
  }
  function goStation(i) {
    stationIdx = i; updateUI();
    if (playing) { audio.pause(); audio.src=''; playing=false; startRadio(); }
  }
  function nextStation() { goStation((stationIdx+1)%STATIONS.length); }
  function prevStation() { goStation((stationIdx-1+STATIONS.length)%STATIONS.length); }

  function setLive(live) {
    document.getElementById('live-dot').className = live?'live-dot':'live-dot off';
    document.getElementById('btn-label').textContent = live?'pause':'play';
    document.getElementById('icon-play').style.display = live?'none':'';
    document.getElementById('icon-pause').style.display = live?'':'none';
    vc.style.boxShadow = live ? `0 0 28px rgba(255,255,255,0.14), 0 0 60px rgba(255,255,255,0.05)` : '';
  }
  function startRadio() {
    initAnalyser();
    if (audioCtx && audioCtx.state==='suspended') audioCtx.resume();
    audio.src = STATIONS[stationIdx].stream;
    return audio.play().then(()=>{ playing=true; setLive(true); });
  }
  function togglePlay() {
    if (playing) { audio.pause(); audio.src=''; playing=false; setLive(false); }
    else startRadio().catch(e=>console.warn(e));
  }
  document.getElementById('vol').addEventListener('input', e=>{ audio.volume=parseFloat(e.target.value); });

  document.addEventListener('keydown', e=>{
    if(e.key==='ArrowUp'){e.preventDefault();prevStation();}
    if(e.key==='ArrowDown'){e.preventDefault();nextStation();}
  });

  window.addEventListener('load', ()=>{
    startRadio().catch(()=>{
      const u=()=>{ startRadio().catch(()=>{}); ['click','keydown','touchstart'].forEach(ev=>document.removeEventListener(ev,u)); };
      ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,u));
    });
  });

  // ── Discord Lanyard ──
  const DISCORD_ID = '312710961691754508';
  function updatePresence(d) {
    const s = d.discord_status || 'offline';
    const dot = document.getElementById('status-dot');
    const word = document.getElementById('status-word');
    const actRow = document.getElementById('activity-row');
    const actIcon = document.getElementById('activity-icon');
    const actText = document.getElementById('activity-text');
    dot.className = `status-dot ${s}`;
    word.className = `s-${s}`;
    word.textContent = {online:'ONLINE',idle:'IDLE',dnd:'DND',offline:'OFFLINE'}[s]||'OFFLINE';
    const acts = (d.activities||[]).filter(a=>a.type!==4);
    if (acts.length) {
      const a = acts[0];
      const icons = {0:'🎮',1:'📡',2:'🎵',3:'📺',5:'🏆'};
      actIcon.textContent = icons[a.type]||'🎮';
      actText.textContent = a.name + (a.details?` — ${a.details}`:'');
      actRow.classList.add('visible');
    } else { actRow.classList.remove('visible'); }
  }
  async function fetchPresence() {
    try { const r=await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`); const j=await r.json(); if(j.success)updatePresence(j.data); } catch(e){}
  }
  fetchPresence(); setInterval(fetchPresence,30000);
  try {
    const ws=new WebSocket('wss://api.lanyard.rest/socket');
    ws.onopen=()=>ws.send(JSON.stringify({op:2,d:{subscribe_to_id:DISCORD_ID}}));
    ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.t==='INIT_STATE'||m.t==='PRESENCE_UPDATE')updatePresence(m.d);
      if(m.op===1)setInterval(()=>ws.send(JSON.stringify({op:3})),m.d.heartbeat_interval);
    };
  } catch(e){}

  // ── cursor ──
  const cur=document.getElementById('cursor');
  document.addEventListener('mousemove',e=>{ cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px'; });
  document.querySelectorAll('a,button,input,#vinyl-canvas,.wordmark .l').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
  });
  document.addEventListener('click',e=>{
    const r=document.createElement('div'); r.className='ripple';
    r.style.left=e.clientX+'px'; r.style.top=e.clientY+'px';
    document.body.appendChild(r); setTimeout(()=>r.remove(),700);
  });

  // ── clock ──
  setInterval(()=>{ document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB',{hour12:false}); },1000);

  // ── colors ──
  const PALETTES=[['#ff00aa','#00d4ff','#aaff00','#ff6600','#cc00ff'],['#ff2200','#ff6600','#ffaa00','#ff3300','#ffdd00'],['#00ccff','#0088ff','#00ffcc','#44aaff','#aaddff'],['#00ff44','#aaff00','#00ffaa','#44ff88','#ccff00'],['#ff44cc','#ff88ff','#ff44aa','#cc44ff','#ff66dd'],['#ffcc00','#ff8800','#ff4400','#ffee44','#ff6600'],['#8800ff','#cc00ff','#ff00cc','#4400ff','#aa00ff']];
  const letters=[0,1,2,3,4].map(i=>document.getElementById('l'+i));
  let pi=0;
  function applyPalette(p){letters.forEach((el,i)=>{el.style.color=p[i];el.style.textShadow=`0 0 30px ${p[i]}, 0 0 80px ${p[i]}44`;});document.documentElement.style.setProperty('--c1',p[0]);document.documentElement.style.setProperty('--c2',p[1]);}
  applyPalette(PALETTES[0]); setInterval(()=>{pi=(pi+1)%PALETTES.length;applyPalette(PALETTES[pi]);},3000);

  // ── starfield ──
  const bgc=document.getElementById('bg'),bgx=bgc.getContext('2d');
  let W,H,stars=[],orbs=[];
  function resize(){W=bgc.width=innerWidth;H=bgc.height=innerHeight;}
  function initStars(){stars=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,o:Math.random()*0.5+0.08,s:Math.random()*0.35+0.04}));}
  function initOrbs(){orbs=Array.from({length:7},(_,i)=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.28,vy:(Math.random()-0.5)*0.28,radius:Math.random()*130+90,hueBase:(i/7)*360}));}
  function hslHex(h,s,l){h=((h%360)+360)%360;s/=100;l/=100;const a=s*Math.min(l,1-l),f=n=>{const k=(n+h/30)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1));};return'#'+[f(0),f(8),f(4)].map(v=>Math.round(v*255).toString(16).padStart(2,'0')).join('');}
  let tick=0;
  function drawBg(){
    tick++;bgx.clearRect(0,0,W,H);
    orbs.forEach(o=>{o.x+=o.vx;o.y+=o.vy;if(o.x<-200)o.x=W+200;if(o.x>W+200)o.x=-200;if(o.y<-200)o.y=H+200;if(o.y>H+200)o.y=-200;const col=hslHex((o.hueBase+tick*0.15)%360,100,55);const g=bgx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.radius);g.addColorStop(0,col+'1e');g.addColorStop(1,col+'00');bgx.beginPath();bgx.arc(o.x,o.y,o.radius,0,Math.PI*2);bgx.fillStyle=g;bgx.fill();});
    stars.forEach(s=>{s.o+=Math.sin(tick*s.s*0.04)*0.003;bgx.beginPath();bgx.arc(s.x,s.y,s.r,0,Math.PI*2);bgx.fillStyle=`rgba(180,220,255,${Math.max(0.04,Math.min(0.6,s.o))})`;bgx.fill();});
    requestAnimationFrame(drawBg);
  }
  resize();initStars();initOrbs();drawBg();
  addEventListener('resize',()=>{resize();initStars();initOrbs();});
</script>
</body>
