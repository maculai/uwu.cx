  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    :root {
      --c1: #ff00aa; --c2: #00d4ff; --c3: #aaff00; --c4: #ff6600; --c5: #cc00ff;
    }

    body {
      background: #04050a;
      font-family: 'Share Tech Mono', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden; cursor: none;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 50; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.055) 3px, rgba(0,0,0,0.055) 4px);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 49; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.9) 100%);
    }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .grid-bg {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: linear-gradient(rgba(0,212,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.022) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* custom cursor */
    .cursor {
      position: fixed; z-index: 9999; pointer-events: none;
      width: 20px; height: 20px; margin: -10px 0 0 -10px;
      transition: transform 0.1s ease;
    }
    .cursor-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1.5px solid var(--c2);
      transition: transform 0.15s ease, border-color 0.2s;
    }
    .cursor-dot {
      position: absolute; top: 50%; left: 50%;
      width: 3px; height: 3px; margin: -1.5px 0 0 -1.5px;
      border-radius: 50%; background: var(--c2);
      transition: background 0.2s;
    }
    .cursor-line {
      position: absolute; background: var(--c2); transition: background 0.2s;
    }
    .cursor-line.t { top: 0; left: 50%; width: 1px; height: 6px; margin-left: -0.5px; }
    .cursor-line.b { bottom: 0; left: 50%; width: 1px; height: 6px; margin-left: -0.5px; }
    .cursor-line.l { left: 0; top: 50%; height: 1px; width: 6px; margin-top: -0.5px; }
    .cursor-line.r { right: 0; top: 50%; height: 1px; width: 6px; margin-top: -0.5px; }
    body.hovering .cursor-ring { transform: scale(2.5); border-color: var(--c1); }
    body.hovering .cursor-dot { background: var(--c1); }
    body.hovering .cursor-line { background: var(--c1); }

    /* HUD corners */
    .hud {
      position: fixed; z-index: 200; font-size: 10px; letter-spacing: 0.1em;
      color: #192e42; pointer-events: none;
      transition: color 0.3s;
    }
    .hud span { color: #1e4a68; transition: color 0.3s; }
    .hud.tl { top: 20px; left: 22px; }
    .hud.tr { top: 20px; right: 22px; }
    .hud.bl { bottom: 20px; left: 22px; }
    .hud.br { bottom: 20px; right: 22px; }

    /* bottom-left status — the fun one */
    .hud-status {
      position: fixed; bottom: 20px; left: 22px;
      z-index: 200; pointer-events: none;
      font-size: 10px; letter-spacing: 0.1em;
      display: flex; align-items: center; gap: 6px;
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #aaff00; animation: blink 1.5s ease-in-out infinite; flex-shrink: 0;
    }
    .status-text { color: #2a5a3a; }
    .status-text .hi { color: #aaff00; }
    .status-text .loc { color: #1e4a68; }

    /* scene */
    .scene {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px; padding: 0 24px;
    }

    /* ── uwu.cx ── */
    .wordmark-wrap {
      position: relative; padding: 18px 40px;
      opacity: 0; transform: translateY(60px) scale(0.88);
      animation: entrance 1s 0.05s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    /* animated corner brackets */
    .wordmark-wrap::before, .wordmark-wrap::after, .br-bl, .br-br {
      content: ''; position: absolute; width: 22px; height: 22px;
      border-style: solid; border-color: rgba(255,255,255,0.12);
      transition: border-color 0.3s, width 0.3s, height 0.3s;
    }
    .wordmark-wrap::before { top:0; left:0; border-width: 1px 0 0 1px; }
    .wordmark-wrap::after  { top:0; right:0; border-width: 1px 1px 0 0; }
    .br-bl { bottom:0; left:0; border-width: 0 0 1px 1px; }
    .br-br { bottom:0; right:0; border-width: 0 1px 1px 0; }
    .wordmark-wrap:hover::before, .wordmark-wrap:hover::after,
    .wordmark-wrap:hover .br-bl, .wordmark-wrap:hover .br-br {
      width: 32px; height: 32px; border-color: rgba(255,255,255,0.35);
    }

    .wordmark {
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      font-size: clamp(80px, 19vw, 200px);
      line-height: 1; letter-spacing: -4px;
      user-select: none; position: relative;
      animation: floatup 4s 1.3s ease-in-out infinite alternate;
    }
    .wordmark .l {
      display: inline-block;
      transition: color 1.5s ease, text-shadow 1.5s ease, transform 0.15s ease;
    }
    .wordmark .l:hover { transform: scale(1.12) translateY(-4px); }
    .wordmark .dot { font-size: 0.45em; vertical-align: middle; margin: 0 2px; opacity: 0.25; color: #fff !important; text-shadow: none !important; }
    .wordmark::after {
      content: 'uwu.cx'; position: absolute; inset: 0;
      font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: -4px;
      color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.12);
      opacity: 0; pointer-events: none; animation: ghost 12s 4s infinite;
    }

    /* ── bottom row ── */
    .bottom-row {
      display: flex; align-items: center; justify-content: center;
      gap: 44px; width: 100%;
      opacity: 0; transform: translateY(30px);
      animation: entrance 0.9s 1.0s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* ── now playing ── */
    .now-playing { display: flex; align-items: center; gap: 16px; }
    .np-vinyl {
      width: 54px; height: 54px; flex-shrink: 0; border-radius: 50%;
      background: conic-gradient(#1a1a1a 0deg, #2a2a2a 30deg, #111 60deg, #222 90deg, #1a1a1a 120deg, #333 150deg, #111 180deg, #2a2a2a 210deg, #1a1a1a 240deg, #333 270deg, #111 300deg, #2a2a2a 330deg, #1a1a1a 360deg);
      border: 1.5px solid rgba(255,255,255,0.06);
      position: relative; cursor: pointer;
      transition: box-shadow 0.4s;
    }
    .np-vinyl::before {
      content: ''; position: absolute; inset: 15px; border-radius: 50%;
      background: radial-gradient(circle, #1a1a2a 40%, #111 100%);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .np-vinyl::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: #04050a; border: 1px solid rgba(255,255,255,0.15); z-index: 1;
    }
    .np-vinyl.spinning {
      animation: spin 3s linear infinite;
      box-shadow: 0 0 20px rgba(170,255,0,0.15), 0 0 40px rgba(170,255,0,0.05);
    }
    .np-vinyl:hover { box-shadow: 0 0 24px rgba(0,212,255,0.2); }

    .np-info {}
    .np-label {
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      color: #2a4a6a; margin-bottom: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #aaff00; animation: blink 1.2s ease-in-out infinite; flex-shrink: 0; }
    .live-dot.off { background: #2a4a6a; animation: none; }
    .np-name {
      font-family: 'Orbitron', sans-serif; font-size: clamp(11px, 1.8vw, 15px);
      font-weight: 900; color: #fff; line-height: 1.2;
      transition: text-shadow 0.3s;
    }
    .np-name:hover { text-shadow: 0 0 20px rgba(255,255,255,0.4); }
    .np-sub { font-size: 9px; color: #2a4a6a; margin-top: 3px; letter-spacing: 0.06em; }
    .np-controls { display: flex; align-items: center; gap: 8px; margin-top: 9px; }
    a, button, input { cursor: none; }
    .play-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 13px; border: 1px solid rgba(255,255,255,0.1); border-radius: 2px;
      background: rgba(255,255,255,0.03); color: #3a6a8a;
      font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 0.15em;
      cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.1s;
    }
    .play-btn:hover { color: #aaff00; border-color: rgba(170,255,0,0.4); background: rgba(170,255,0,0.05); transform: scale(1.04); }
    .play-btn:active { transform: scale(0.97); }
    .play-btn svg { width: 9px; height: 9px; flex-shrink: 0; }
    input[type=range] {
      -webkit-appearance: none; width: 60px; height: 2px;
      background: rgba(255,255,255,0.08); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 8px; height: 8px;
      border-radius: 50%; background: rgba(255,255,255,0.35); cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    input[type=range]:hover::-webkit-slider-thumb { background: #aaff00; transform: scale(1.3); }

    /* divider */
    .divider {
      width: 1px; height: 68px; flex-shrink: 0;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.07), transparent);
    }

    /* ── steam block ── */
    .steam-block { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
    .steam-btn {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 9px 18px; border: 1px solid rgba(255,255,255,0.08); border-radius: 2px;
      background: rgba(255,255,255,0.02); text-decoration: none; color: #2e5a7a;
      font-size: 11px; letter-spacing: 0.1em;
      transition: color 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .steam-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: translateX(-100%); transition: transform 0.5s;
    }
    .steam-btn:hover::before { transform: translateX(100%); }
    .steam-btn:hover {
      color: #fff; border-color: rgba(255,255,255,0.25);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 16px rgba(0,212,255,0.08);
    }
    .steam-btn svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.55; transition: opacity 0.2s; }
    .steam-btn:hover svg { opacity: 1; }

    /* keyframes */
    @keyframes entrance { to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes floatup { from { transform: translateY(0); } to { transform: translateY(-14px); } }
    @keyframes ghost {
      0%,87%,100%{opacity:0;transform:none}
      88%{opacity:1;transform:translateX(-5px) skewX(-3deg);clip-path:inset(18% 0 52% 0)}
      89%{opacity:1;transform:translateX(5px);clip-path:inset(58% 0 8% 0)}
      90%{opacity:0}
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ripple on click */
    .ripple {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 9998;
      animation: rippleOut 0.6s ease forwards;
    }
    @keyframes rippleOut {
      from { width: 0; height: 0; opacity: 0.5; margin: 0; border: 1px solid var(--c2); }
      to   { width: 80px; height: 80px; opacity: 0; margin: -40px; border: 1px solid var(--c2); }
    }

    @media (max-width: 560px) {
      .wordmark { letter-spacing: -2px; }
      .bottom-row { flex-direction: column; gap: 24px; }
      .divider { width: 60px; height: 1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.07), transparent); }
      .steam-block { align-items: center; }
    }
  </style>
</head>
<body>

<!-- custom cursor -->
<div class="cursor" id="cursor">
  <div class="cursor-ring"></div>
  <div class="cursor-dot"></div>
  <div class="cursor-line t"></div>
  <div class="cursor-line b"></div>
  <div class="cursor-line l"></div>
  <div class="cursor-line r"></div>
</div>

<canvas id="c"></canvas>
<div class="grid-bg"></div>

<!-- HUD -->
<div class="hud tl">SYS // <span id="clock">--:--:--</span></div>
<div class="hud tr">HOST // <span>UWU.CX</span></div>
<div class="hud br">VER // <span>1.0</span></div>
<div class="hud-status">
  <div class="status-dot"></div>
  <div class="status-text">
    <span class="hi">ONLINE</span> <span class="loc">FROM PALM HARBOR, FLORIDA</span>
  </div>
</div>

<div class="scene">

  <!-- uwu.cx -->
  <div class="wordmark-wrap">
    <div class="br-bl"></div><div class="br-br"></div>
    <div class="wordmark">
      <span class="l" id="l0">u</span><span class="l" id="l1">w</span><span class="l" id="l2">u</span><span class="dot">.</span><span class="l" id="l3">c</span><span class="l" id="l4">x</span>
    </div>
  </div>

  <!-- bottom row -->
  <div class="bottom-row">

    <!-- now playing -->
    <div class="now-playing">
      <div class="np-vinyl" id="vinyl" onclick="togglePlay()" title="click to play"></div>
      <div class="np-info">
        <div class="np-label">
          <span class="live-dot off" id="live-dot"></span>
          <span>now playing</span>
        </div>
        <div class="np-name">Dr Dick's<br>Dub Shack</div>
        <div class="np-sub">Bermuda &middot; radio.garden</div>
        <div class="np-controls">
          <button class="play-btn" onclick="togglePlay()">
            <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            <span id="btn-label">play</span>
          </button>
          <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8"/>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- steam -->
    <div class="steam-block">
      <a class="steam-btn" href="https://steamcommunity.com/id/being" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.98 0C5.37 0 .004 5.177.004 11.568l6.432 2.66a3.31 3.31 0 0 1 1.913-.607l2.857-4.138V9.44a4.44 4.44 0 0 1 4.44-4.44 4.44 4.44 0 0 1 4.44 4.44 4.44 4.44 0 0 1-4.44 4.44h-.102L11.69 16.4a3.305 3.305 0 0 1-3.296 3.305 3.31 3.31 0 0 1-3.23-2.59L.38 15.265C2.258 20.3 6.72 24 11.98 24 18.626 24 24 18.627 24 12S18.626 0 11.98 0z"/></svg>
        STEAM
      </a>
    </div>

  </div>
</div>

<audio id="radio" preload="none" crossorigin="anonymous"></audio>

<script>
  // ── cursor ──
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
  document.querySelectorAll('a, button, input, .np-vinyl, .wordmark .l').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });

  // click ripple
  document.addEventListener('click', e => {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = e.clientX + 'px';
    r.style.top  = e.clientY + 'px';
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 700);
  });

  // ── audio ──
  const STREAM = 'https://streamer.radio.co/s0635c8b0d/listen';
  const audio = document.getElementById('radio');
  audio.volume = 0.8;
  let playing = false;

  function setLive(live) {
    document.getElementById('live-dot').className = live ? 'live-dot' : 'live-dot off';
    document.getElementById('vinyl').classList.toggle('spinning', live);
    document.getElementById('btn-label').textContent = live ? 'pause' : 'play';
    document.getElementById('icon-play').style.display = live ? 'none' : '';
    document.getElementById('icon-pause').style.display = live ? '' : 'none';
  }
  function startRadio() {
    audio.src = STREAM;
    return audio.play().then(() => { playing = true; setLive(true); });
  }
  function togglePlay() {
    if (playing) { audio.pause(); audio.src = ''; playing = false; setLive(false); }
    else startRadio().catch(e => console.warn(e));
  }
  document.getElementById('vol').addEventListener('input', e => { audio.volume = parseFloat(e.target.value); });

  window.addEventListener('load', () => {
    startRadio().catch(() => {
      const unlock = () => {
        startRadio().catch(() => {});
        ['click','keydown','touchstart'].forEach(ev => document.removeEventListener(ev, unlock));
      };
      ['click','keydown','touchstart'].forEach(ev => document.addEventListener(ev, unlock));
    });
  });

  // ── clock ──
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB', {hour12:false});
  }, 1000);

  // ── color cycling ──
  const PALETTES = [
    ['#ff00aa','#00d4ff','#aaff00','#ff6600','#cc00ff'],
    ['#ff2200','#ff6600','#ffaa00','#ff3300','#ffdd00'],
    ['#00ccff','#0088ff','#00ffcc','#44aaff','#aaddff'],
    ['#00ff44','#aaff00','#00ffaa','#44ff88','#ccff00'],
    ['#ff44cc','#ff88ff','#ff44aa','#cc44ff','#ff66dd'],
    ['#ffcc00','#ff8800','#ff4400','#ffee44','#ff6600'],
    ['#8800ff','#cc00ff','#ff00cc','#4400ff','#aa00ff'],
  ];
  const letters = [0,1,2,3,4].map(i => document.getElementById('l'+i));
  let pi = 0;
  function applyPalette(p) {
    letters.forEach((el,i) => { el.style.color=p[i]; el.style.textShadow=`0 0 30px ${p[i]}, 0 0 80px ${p[i]}44`; });
    document.documentElement.style.setProperty('--c1', p[0]);
    document.documentElement.style.setProperty('--c2', p[1]);
  }
  applyPalette(PALETTES[0]);
  setInterval(() => { pi=(pi+1)%PALETTES.length; applyPalette(PALETTES[pi]); }, 3000);

  // ── starfield ──
  const cv=document.getElementById('c'), ct=cv.getContext('2d');
  let W,H,stars=[],orbs=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  function initStars(){stars=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,o:Math.random()*0.5+0.08,s:Math.random()*0.35+0.04}));}
  function initOrbs(){orbs=Array.from({length:7},(_,i)=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.28,vy:(Math.random()-0.5)*0.28,radius:Math.random()*130+90,hueBase:(i/7)*360}));}
  function hslHex(h,s,l){h=((h%360)+360)%360;s/=100;l/=100;const a=s*Math.min(l,1-l),f=n=>{const k=(n+h/30)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1));};return '#'+[f(0),f(8),f(4)].map(v=>Math.round(v*255).toString(16).padStart(2,'0')).join('');}
  let tick=0;
  function draw(){
    tick++;ct.clearRect(0,0,W,H);
    orbs.forEach(o=>{
      o.x+=o.vx;o.y+=o.vy;
      if(o.x<-200)o.x=W+200;if(o.x>W+200)o.x=-200;if(o.y<-200)o.y=H+200;if(o.y>H+200)o.y=-200;
      const col=hslHex((o.hueBase+tick*0.15)%360,100,55);
      const g=ct.createRadialGradient(o.x,o.y,0,o.x,o.y,o.radius);
      g.addColorStop(0,col+'1e');g.addColorStop(1,col+'00');
      ct.beginPath();ct.arc(o.x,o.y,o.radius,0,Math.PI*2);ct.fillStyle=g;ct.fill();
    });
    stars.forEach(s=>{
      s.o+=Math.sin(tick*s.s*0.04)*0.003;
      ct.beginPath();ct.arc(s.x,s.y,s.r,0,Math.PI*2);
      ct.fillStyle=`rgba(180,220,255,${Math.max(0.04,Math.min(0.6,s.o))})`;ct.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();initStars();initOrbs();draw();
  addEventListener('resize',()=>{resize();initStars();initOrbs();});
</script>
</body>
</html>
